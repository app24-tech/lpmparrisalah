<!DOCTYPE html>
<html>
<head>
  <title>Applikasi LPMP</title>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbyj-EHubEGf-NRlyPTSJoU3YYjT9KuJeJs7qD4BiAh4yguC60C1dhAE6mCOGH0XkaM2/exec" 
    width="100%" 
    height="100%" 
    allowfullscreen="true" 
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>
  <script>
    window.onload = function() {
      document.querySelector('iframe').requestFullscreen().catch((err) => {
        console.error(`Error attempting to enable full-screen mode: ${err.message}`);
      });
    };
  </script>
</body>
</html>
